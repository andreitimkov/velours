databases:
  - name: velours-db
    plan: free
    databaseName: velours_db
    user: velours_user

services:
  - type: web
    name: velours
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: velours-db
          property: connectionString
